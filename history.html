<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lịch Sử Hoạt Động | SAFE VMU</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="client_auth.js"></script>
</head>
<body>

  <header>
    <div class="logo">
      <div class="logo-icon">🔐</div>
      <div>
        <div>SAFE VMU</div>
        <div class="logo-sub">SURVEILLANCE SYSTEM</div>
      </div>
    </div>
    <div class="header-center">
      SAFE_VMU_01 · NHẬT KÝ HOẠT ĐỘNG<br>
      <span>■ ■ ■</span>
    </div>
    <div class="clock" id="clock">--:--:--</div>
  </header>

  <nav>
    <div class="nav-links">
      <a href="index.html">🏠 Trang chủ</a>
      <a href="history.html" class="active">📋 Lịch sử</a>
      <a href="#">👤 Tài khoản</a>
    </div>
    <div class="nav-user">
      <span id="userNameDisplay" style="font-weight:600;">User</span>
      <button class="btn btn-danger" style="padding:6px 14px;font-size:0.78rem;" onclick="doLogout()">Đăng xuất</button>
    </div>
  </nav>

  <div class="container">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;">
      <div>
        <div class="page-title">📋 Nhật ký hoạt động</div>
        <div style="font-size:0.82rem;color:var(--text-2);">Theo dõi toàn bộ lịch sử mở/đóng két sắt</div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-secondary" onclick="loadHistory()" style="font-size:0.82rem;padding:8px 16px;">↺ Làm mới</button>
        <select id="filterStatus" class="input-field" style="width:auto;padding:8px 14px;font-size:0.82rem;" onchange="applyFilter()">
          <option value="">Tất cả trạng thái</option>
          <option value="success">Thành công</option>
          <option value="fail">Thất bại</option>
        </select>
        <input type="date" id="filterDate" class="input-field" style="width:auto;padding:8px 14px;font-size:0.82rem;" onchange="applyFilter()">
      </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;">
      <div class="card" style="padding:16px 20px;">
        <div style="font-size:0.7rem;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;">Tổng lượt</div>
        <div style="font-size:1.5rem;font-weight:700;font-family:var(--font-mono);" id="statTotal">—</div>
      </div>
      <div class="card" style="padding:16px 20px;">
        <div style="font-size:0.7rem;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;">Thành công</div>
        <div style="font-size:1.5rem;font-weight:700;color:var(--green);font-family:var(--font-mono);" id="statSuccess">—</div>
      </div>
      <div class="card" style="padding:16px 20px;">
        <div style="font-size:0.7rem;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;">Thất bại</div>
        <div style="font-size:1.5rem;font-weight:700;color:var(--red);font-family:var(--font-mono);" id="statFail">—</div>
      </div>
      <div class="card" style="padding:16px 20px;">
        <div style="font-size:0.7rem;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;">Hôm nay</div>
        <div style="font-size:1.5rem;font-weight:700;color:var(--accent);font-family:var(--font-mono);" id="statToday">—</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">Danh sách bản ghi</div>
        <span class="badge badge-accent" id="recordCount">0 bản ghi</span>
      </div>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>Thời gian</th>
              <th>Người mở</th>
              <th>Két sắt</th>
              <th>Trạng thái</th>
              <th style="text-align:right;">Hành động</th>
            </tr>
          </thead>
          <tbody id="historyBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    function tick() {
      document.getElementById('clock').textContent = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    tick(); setInterval(tick, 1000);

    const user = getCurrentUser();
    document.getElementById('userNameDisplay').textContent = user ? user.full_name : 'Khách';

    let allLogs = [];
    let targetSafeId = 'SN-2026-00001'; 

    async function loadHistory() {
      try {
        const res = await fetch(`${API_BASE}/history/view`, {
          method: 'POST',
          headers: getAuthHeaders(),
          body: JSON.stringify({ user_id: user.id, safe_id: targetSafeId })
        });
        const data = await res.json();
        if (data.success && data.logs) {
          allLogs = data.logs;
          applyFilter();
        }
      } catch (err) { alert("Lỗi tải dữ liệu"); }
    }

    function applyFilter() {
      const status = document.getElementById('filterStatus').value;
      const dateSelected = document.getElementById('filterDate').value;
      
      const filtered = allLogs.filter(l => {
        const logDate = new Date(l.attempted_at).toISOString().split('T')[0];
        const matchStatus = !status || (status === 'success' ? (l.result === 'success') : (l.result !== 'success'));
        const matchDate = !dateSelected || logDate === dateSelected;
        return matchStatus && matchDate;
      });
      
      updateStats(filtered);
      renderTable(filtered);
    }

    function updateStats(logs) {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('statTotal').textContent = logs.length;
      document.getElementById('statSuccess').textContent = logs.filter(l => l.result === 'success').length;
      document.getElementById('statFail').textContent = logs.filter(l => l.result !== 'success').length;
      document.getElementById('statToday').textContent = logs.filter(l => l.attempted_at.startsWith(today)).length;
    }

    function renderTable(logs) {
      document.getElementById('recordCount').textContent = logs.length + ' bản ghi';
      const tbody = document.getElementById('historyBody');
      if (!logs.length) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:40px;">📭 Không có dữ liệu</td></tr>`;
        return;
      }
      tbody.innerHTML = logs.map(log => `
        <tr>
          <td class="mono">${new Date(log.attempted_at).toLocaleString('vi-VN')}</td>
          <td style="font-weight:500;">${log.accounts ? log.accounts.full_name : 'Unknown'}</td>
          <td class="mono">${log.safe_id}</td>
          <td>${log.result === 'success' ? '<span class="badge badge-green">Thành công</span>' : '<span class="badge badge-red">Thất bại</span>'}</td>
          <td style="text-align:right;"><button class="btn btn-danger" onclick="deleteLog(${log.id})">🗑 Xóa</button></td>
        </tr>
      `).join('');
    }

    function deleteLog(id) { if(confirm('Xóa bản ghi này?')) alert('Đã xóa log ' + id); }

    loadHistory();
  </script>
</body>
</html>
